name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
    # converted_to_draft kept: creates "skipped" check entries satisfying required-check rules
    branches: [main]
    # paths-ignore intentionally removed — use changes preflight job instead
    # (workflow-level path filters deadlock required status checks for docs-only PRs)
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # code=true when at least one changed file is not a documentation file.
      # For push events the paths-filter step is skipped; default to 'true'
      # so downstream jobs always run on direct main pushes.
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # Negation patterns with default 'some' quantifier (correct approach).
          # dorny/paths-filter's 'some' mode: code=true if at least one changed
          # file matches the filter. A file matches 'code' when it satisfies '**'
          # (all files) and is NOT excluded by any negation pattern.
          # Result: code=false only when ALL changed files are docs/templates.
          # Source: filter.ts:isMatch() uses patterns.some(aPredicate) by default,
          # where negation patterns correctly exclude doc files from matching.
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'


  build:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

  test:
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test
        run: go test -race -count=1 -timeout 5m ./...

  vet:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet
        run: go vet ./...

  lint:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m
