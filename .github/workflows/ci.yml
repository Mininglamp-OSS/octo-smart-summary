name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
    # converted_to_draft kept: creates "skipped" check entries satisfying required-check rules
    branches: [main]
    # paths-ignore intentionally removed — use changes preflight job instead
    # (workflow-level path filters deadlock required status checks for docs-only PRs)
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # code=true when at least one changed file matches the code filter.
      # predicate-quantifier:every + negation patterns (no bare '**'):
      # a file matches 'code' iff ALL negation patterns are satisfied
      # (file is not a doc/template). code=false only when all changed files
      # are docs/templates. Push events default to 'true'.
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # predicate-quantifier: every — a file matches 'code' only when ALL
          # negation patterns are satisfied (file is NOT a doc/template file).
          #
          # Validated by picomatch v4 unit test (same library used internally):
          #   README.md:    !**/*.md=false → every=false → not match → code=false ✅
          #   main.go:      all negations=true → every=true → match → code=true ✅
          #   mixed PR:     main.go matches → code=true (some over changed files) ✅
          #   .golangci.yml: all negations=true → every=true → CI runs ✅
          #   Dockerfile:   all negations=true → CI runs ✅
          #
          # Do NOT add '**': picomatch('**') doesn't match dotfiles (.golangci.yml)
          # causing them to incorrectly skip CI with the 'every' quantifier.
          # Do NOT use 'some' + negation: '**' short-circuits some to true always.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'


  build:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

  test:
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run tests
        id: run-tests
        run: |
          gotestsum \
            --junitfile junit.xml \
            --format short-verbose \
            -- -race -shuffle=on -count=1 -timeout 5m \
               -coverprofile=coverage.out \
               -covermode=atomic ./...

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            junit.xml
            coverage.out
          retention-days: 14

      - name: Write PR summary
        if: always()
        run: |
          outcome="${{ steps.run-tests.outcome }}"

          case "$outcome" in
            success) verdict="✅ **PASSED**" ;;
            failure) verdict="❌ **FAILED**" ;;
            *)       verdict="⏭️ **${outcome}**" ;;
          esac

          total=0; failed=0; errors=0; skipped=0; passed=0
          if [ -f junit.xml ]; then
            total=$(grep -o 'tests="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*' || echo 0)
            failed=$(grep -o 'failures="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*' || echo 0)
            errors=$(grep -o 'errors="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*' || echo 0)
            skipped=$(grep -o 'skipped="[0-9]*"' junit.xml | grep -o '[0-9]*' | paste -sd+ - | bc 2>/dev/null || echo 0)
            passed=$(( total - failed - errors - skipped ))
            [ "$passed" -lt 0 ] && passed=0
          fi

          {
            echo "## 🧪 Test Results"
            echo
            echo "${verdict}"
            echo
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| 🧮 Total | ${total} |"
            echo "| ✅ Passed | ${passed} |"
            echo "| ❌ Failed | ${failed} |"
            echo "| 💥 Errors | ${errors} |"
            echo "| ⏭️ Skipped | ${skipped} |"
            echo
            echo "**Flags:** \`-race -shuffle=on\`"
            echo
            echo "📦 [Download artifacts](../actions/runs/${{ github.run_id }}#artifacts)"
          } >> "$GITHUB_STEP_SUMMARY"

  diff-coverage:
    needs: [changes, test]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.test.result == 'success' &&
      needs.changes.outputs.code == 'true'
    name: Diff Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    # Match .github reusable-quality workflows R6 pattern: expose IS_FORK at
    # job level so the octocov config can gate the PR-comment step without
    # 403'ing on fork PRs (where GITHUB_TOKEN is read-only).
    env:
      IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-results

      # Diff-only gate: report total coverage but only fail the job when the
      # *diff* coverage drops below 60%. coverage.acceptable is intentionally
      # omitted so this job does not block PRs based on the repo-wide baseline.
      #
      # comment.if gates the PR-comment step on non-fork PRs only. On fork PRs
      # GITHUB_TOKEN is read-only, so octocov would 403 trying to comment and
      # fail the job; the diff-coverage summary still appears in the job log.
      - name: Generate octocov config
        run: |
          cat > .octocov.yml <<'EOF'
          coverage:
            paths:
              - coverage.out
          diff:
            coverage:
              acceptable: 60
          comment:
            if: env.IS_FORK != 'true'
            hideFooterLink: false
          summary:
            if: true
          EOF

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  vet:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet
        run: go vet ./...

  lint:
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      needs.changes.outputs.code == 'true'
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m
