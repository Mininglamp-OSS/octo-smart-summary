# 智能总结意图识别规则配置
# 基于 273 个真实 topic 数据分析生成
# 日期：2026-06-17

# ========================================
# 时间词（hasTimeWord 检测）
# 命中任意一个 → 需要 LLM 解析时间
# ========================================
time_words:
  # 相对时间（高频）
  - "本周"      # 30次
  - "最近"      # 24次
  - "周报"      # 21次 - 隐含"本周"
  - "一周"      # 15次
  - "上周"      # 12次
  - "过去"      # 10次
  - "昨天"      # 6次
  - "日报"      # 5次 - 隐含"昨天/今天"
  - "至今"      # 5次
  - "每周"      # 4次
  - "下周"      # 4次
  - "这周"      # 3次
  - "两周"      # 3次
  - "今天"      # 3次
  - "近期"      # 2次
  - "五一"      # 2次
  - "一个月"    # 2次
  - "以来"      # 1次
  
  # 数字时间（正则匹配）
  - "7天"
  - "14天"
  - "30天"
  
  # 日期格式（需要正则）
  # 格式: X月、X.X、X月X日、X号
  # 例: "5月"、"6.1"、"5月1号"

# 时间词正则模式（补充上面的固定词）
time_patterns:
  - "\\d+天"           # 7天、14天、30天
  - "\\d+周"           # 2周、3周
  - "\\d+月"           # 5月、6月
  - "\\d+\\.\\d+"      # 6.1、5.6
  - "\\d+月\\d+[日号]" # 5月1日、6月10号
  - "\\d+[日号]"       # 1号、10日

# ========================================
# 人物词（hasPersonWord 检测）
# 命中任意一个 → 需要 LLM 解析人物
# ========================================
person_words:
  # 自我指代（高频）
  - "我的"      # 24次
  - "我在"      # 8次
  - "我做"      # 4次
  - "我和"      # 3次
  - "我推"      # 2次
  - "和我"      # 9次
  - "跟我"      # 2次
  - "发给我"    # 4次
  
  # 群体指代
  - "大家"      # 10次
  - "团队"      # 9次
  - "每个人"
  - "各位"
  - "所有人"
  
  # 常见人名/称呼（可扩展）
  - "赵老师"    # 6次
  - "辉哥"      # 3次
  - "斌哥"

# 人物词正则模式
person_patterns:
  - "@\\S+"     # @mentions，如 @李晓同

# ========================================
# 复杂频道词（hasComplexChannelWord 检测）
# 命中任意一个 → 需要 LLM 判断频道范围
# ========================================
complex_channel_words:
  # 多频道指代（需要 LLM 判断是哪些）
  - "这些群"    # 5次
  - "这几个群"
  - "这两个群"  # 1次
  - "那些群"
  - "其他群"
  
  # 频道类型指代
  - "私聊"      # 3次
  - "私信"      # 1次
  - "所有群"
  - "全部群"

# ========================================
# 简单频道词（文档用途，代码中不检测）
# 这些词指向当前 context，不需要 LLM 解析
# 注：没有 hasSimpleChannelWord 函数是有意的
#     因为这些词"不触发 LLM"才是正确行为
# ========================================
simple_channel_words:
  - "群里"      # 29次 - 指当前群
  - "这个群"    # 15次 - 指当前群
  - "本群"      # 2次 - 指当前群
  - "群内"      # 3次 - 指当前群
  - "群聊"      # 5次 - 可能指当前群
  - "子区"      # 5次 - 指当前子区
  - "Thread"    # 18次 - 指当前 Thread

# ========================================
# 纯泛主题（isPureGenericTopic 检测）
# 完全匹配这些 → 直接短路，不调 LLM
# ========================================
generic_topics:
  # 完全匹配
  - "总结"
  - "总结一下"
  - "周报"
  - "总结主题"
  - "概要"
  - "工作内容"
  - "ZONGJIE"
  
  # 极简主题（会被规范化后匹配）
  - "总结结论"
  - "知识库"
  - "竞品分析"
  - "能力"

# 泛主题正则（topic 长度短且只含"总结"相关词）
# 注意：不要在这里放包含时间词的模式（如"本周xxx"、"上周xxx"）
#       那些应该走 LLM 解析时间范围
generic_patterns:
  - "^总结$"
  - "^总结一下$"
  - "^周报$"
  - "^做个周报$"
  - "^工作总结$"
